<!DOCTYPE html>
<html>
<head>
    <title>Biotrace Result</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

    <h1>🧬 Biotrace</h1>
    <p>Prediction Result</p>

    <!-- 🔥 Upload Message -->
    <p class="message">✅ Image uploaded successfully</p>

    <!-- ✅ Show result ONLY if prediction exists -->
    {% if prediction %}
    <div class="result-box">
        <h2 class="result">🩸 {{ prediction }}</h2>
        <p class="confidence">Confidence: {{ confidence }}%</p>
    </div>
    {% endif %}

    <!-- 🔥 System Message -->
    <p class="message">{{ message }}</p>

    <!-- 🔥 REGISTER BUTTON -->
    {% if show_register %}
    <form action="/register_page" method="POST">
        <input type="hidden" name="filename" value="{{ filename }}">
        <button type="submit" class="back-btn" style="margin-top:15px;">
            Register Fingerprint
        </button>
    </form>
    {% endif %}

    <!-- Back Button -->
    <a href="/" class="back-btn">Try Another</a>

</div>

</body>
</html>
