<!DOCTYPE html>
<html>
<head>
    <title>Register Fingerprint</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

    <h1>📝 Register Fingerprint</h1>

    <img src="{{ filepath }}" class="preview">

    <form action="/register" method="POST">

        <input type="hidden" name="filename" value="{{ filename }}">

        <label style="margin-top:15px;">Select Blood Group</label>

        <select name="label" required style="margin-top:10px; padding:10px; border-radius:10px;">
            <option value="">-- Select --</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="AB">AB</option>
            <option value="O">O</option>
        </select>

        <button type="submit" style="margin-top:20px;">
            Register
        </button>

    </form>

</div>

</body>
</html>
