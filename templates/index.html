<!DOCTYPE html>
<html>
<head>
    <title>Biotrace</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">
    <h1>🧬 Biotrace</h1>
    <p>AI Blood Group Detection</p>

    <form action="/predict" method="POST" enctype="multipart/form-data">
        
        <label class="upload-box">
            Upload Fingerprint
            <input type="file" name="file" id="fileInput" required>
        </label>

        <!-- ✅ File selected message -->
        <p id="filename" class="message"></p>

        <!-- Predict Button -->
        <button type="submit" id="predictBtn">Predict</button>

        <!-- Loader -->
        <div id="loader" style="display:none;">
            <div class="spinner"></div>
            <p>Analyzing fingerprint...</p>
        </div>

    </form>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const form = document.querySelector("form");
const loader = document.getElementById("loader");
const filenameText = document.getElementById("filename");
const predictBtn = document.getElementById("predictBtn");

// ✅ Show only filename message (NO IMAGE PREVIEW)
fileInput.addEventListener("change", function() {
    const file = this.files[0];

    if (file) {
        filenameText.textContent = "✅ File selected: " + file.name;
    }
});

// Loader + disable button
form.addEventListener("submit", function() {
    loader.style.display = "block";
    predictBtn.disabled = true;
    predictBtn.innerText = "Processing...";
});
</script>

</body>
</html>
